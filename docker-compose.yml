version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: trivia_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: trivia
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./.docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - trivia_network

  redis:
    image: redis:7-alpine
    container_name: trivia_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - trivia_network

  backend:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    container_name: trivia_backend
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./.docker/php/nginx/default.conf:/etc/nginx/sites-available/default
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=trivia
      - DB_USERNAME=root
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - db
      - redis
    networks:
      - trivia_network

  reverb:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    container_name: trivia_reverb
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - .:/var/www/html
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=trivia
      - DB_USERNAME=root
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    command: php artisan reverb:start
    depends_on:
      - db
      - redis
    networks:
      - trivia_network

  frontend:
    build:
      context: ../frontend
      dockerfile: ../backend/.docker/node/Dockerfile
    container_name: trivia_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - trivia_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: trivia_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    depends_on:
      - db
    networks:
      - trivia_network

networks:
  trivia_network:
    driver: bridge

volumes:
  db_data: